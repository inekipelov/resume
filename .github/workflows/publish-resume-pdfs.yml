name: Publish Resume PDFs

on:
  push:
    branches:
      - release
    paths:
      - "resumes/**/resume.md"
      - "scripts/**"
      - "assets/pdf/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/publish-resume-pdfs.yml"

permissions:
  contents: write

concurrency:
  group: publish-resume-pdfs
  cancel-in-progress: true

jobs:
  publish:
    name: Build and publish versioned release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Resolve Chrome executable path
        run: |
          if command -v google-chrome >/dev/null 2>&1; then
            echo "PUPPETEER_EXECUTABLE_PATH=$(command -v google-chrome)" >> "$GITHUB_ENV"
          elif command -v google-chrome-stable >/dev/null 2>&1; then
            echo "PUPPETEER_EXECUTABLE_PATH=$(command -v google-chrome-stable)" >> "$GITHUB_ENV"
          elif command -v chromium-browser >/dev/null 2>&1; then
            echo "PUPPETEER_EXECUTABLE_PATH=$(command -v chromium-browser)" >> "$GITHUB_ENV"
          elif command -v chromium >/dev/null 2>&1; then
            echo "PUPPETEER_EXECUTABLE_PATH=$(command -v chromium)" >> "$GITHUB_ENV"
          else
            echo "Chrome/Chromium executable was not found on this runner." >&2
            exit 1
          fi

      - name: Build PDF files
        run: npm run build:resume-pdfs

      - name: Compute release metadata
        id: release_metadata
        run: |
          release_version="$(date -u +"%Y.%m.%d.%H.%M")"
          short_sha="${GITHUB_SHA::7}"
          release_tag="${release_version}-${short_sha}"

          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: resume-pdfs-${{ steps.release_metadata.outputs.release_tag }}
          path: |
            dist/resume-pdfs/*.pdf
            dist/resume-pdfs/manifest.json
          if-no-files-found: error

      - name: Remove legacy rolling release
        env:
          GH_TOKEN: ${{ github.token }}
          LEGACY_TAG_NAME: resume-pdfs-latest
        run: |
          if gh release view "$LEGACY_TAG_NAME" >/dev/null 2>&1; then
            gh release delete "$LEGACY_TAG_NAME" --cleanup-tag --yes
          fi

      - name: Create versioned release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.release_metadata.outputs.release_version }}
          RELEASE_TAG: ${{ steps.release_metadata.outputs.release_tag }}
        run: |
          gh release create "$RELEASE_TAG" dist/resume-pdfs/*.pdf \
            --title "$RELEASE_VERSION" \
            --notes "Auto-generated resume PDFs version $RELEASE_VERSION from commit $GITHUB_SHA on branch $GITHUB_REF_NAME." \
            --target "$GITHUB_SHA" \
            --latest
